# backend/pgbouncer.ini

[databases]
gamehub_db = host=aws-rds-postgres-primary.cluster.internal port=5432 dbname=gamehub_db

[pgbouncer]
logfile = /var/log/pgbouncer/pgbouncer.log
pidfile = /var/run/pgbouncer/pgbouncer.pid

listen_addr = 0.0.0.0
listen_port = 6432

auth_type = md5
auth_file = /etc/pgbouncer/userlist.txt

admin_users = postgres
stats_users = monitoring

# Connection Pool Settings (Capped at 500 active database connection pipelines)
# Matches 10 ECS Tasks * 50 connections pool ceiling
pool_mode = transaction
max_client_conn = 10000
default_pool_size = 500
min_pool_size = 10
reserve_pool_size = 50
reserve_pool_timeout = 5

# Connection Timeouts & Keepalives
query_timeout = 30
client_idle_timeout = 120
server_idle_timeout = 60
server_lifetime = 3600
server_connect_timeout = 15
server_login_retry = 15
